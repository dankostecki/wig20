name: Update WIG20 Dashboard

on:
  schedule:
    - cron: '0 18 * * *' # Automatyczna aktualizacja codziennie o 18:00
  workflow_dispatch:      # Pozwala Ci uruchomić proces ręcznie jednym kliknięciem

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run WIG20 script
        run: python app.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
